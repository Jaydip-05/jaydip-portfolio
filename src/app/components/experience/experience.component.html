<section class="experience-section" id="experience">
  <div class="container">

    <h2 class="section-title">Professional Journey</h2>
    <div class="underline"></div>
    <p class="section-subtitle">A timeline of my career growth and major milestones.</p>

    <div class="timeline ps-md-5">
      <div class="timeline-item position-relative mb-5" *ngFor="let exp of experiences">
        <div class="timeline-dot"></div>
        <div class="glass-card ms-4">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
            <div>
              <h3 class="h4 fw-bold mb-1">{{ exp.role }}</h3>
              <h4 class="h6 text-primary fw-bold mb-0">{{ exp.company }}</h4>
            </div>
            <span class="badge bg-secondary rounded-pill">{{ exp.duration }}</span>
          </div>
          <!-- <p class="text-muted small mb-0">{{ exp.description }}</p> -->
        </div>
      </div>
    </div>

  </div>
</section>
