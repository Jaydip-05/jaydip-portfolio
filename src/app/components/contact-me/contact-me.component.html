<section class="contact-section py-5" id="contact">
  <div class="container py-lg-5">
    <div class="row g-5">

      <!-- LEFT -->
      <div class="col-lg-5 contact-info">
        <h2 class="display-5 fw-bold mb-4">Let's build something <span class="text-primary">extraordinary.</span></h2>

        <p class="text-muted mb-5 fs-5">
          I'm currently available for freelance projects and full-time opportunities.
          Feel free to reach out for collaboration or just to say hi!
        </p>

        <div class="details mb-5">
          <div class="d-flex align-items-center mb-3">
            <div class="icon-circle me-3"><i class="bi bi-geo-alt-fill text-primary"></i></div>
            <p class="mb-0 fw-semibold">Pune, Maharashtra, India</p>
          </div>
          <div class="d-flex align-items-center">
            <div class="icon-circle me-3"><i class="bi bi-envelope-fill text-primary"></i></div>
            <p class="mb-0 fw-semibold">{{email}}</p>
          </div>  
        </div>

        <div class="socials d-flex gap-3">
          <a href="#" class="social-link"><i class="bi bi-linkedin"></i></a>
          <a href="#" class="social-link"><i class="bi bi-github"></i></a>
          <a href="#" class="social-link"><i class="bi bi-twitter-x"></i></a>
        </div>
      </div>

      <!-- RIGHT FORM -->
      <div class="col-lg-7">
        <div class="glass-card p-4 p-md-5">
          <form class="contact-form">
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label small fw-bold text-muted">Full Name</label>
                <input type="text" class="form-control" placeholder="John Doe" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-bold text-muted">Email Address</label>
                <input type="email" class="form-control" placeholder="john&#64;example.com" />
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label small fw-bold text-muted">Message</label>
              <textarea class="form-control" rows="5" placeholder="How can I help you?"></textarea>
            </div>

            <button type="submit" class="btn-primary-custom w-100 py-3 mt-2">Send Message</button>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>
