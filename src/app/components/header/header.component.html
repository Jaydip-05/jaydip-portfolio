<header class="navbar fixed-top" [class.scrolled]="isScrolled">
  <div class="container d-flex justify-content-between align-items-center">
    <div class="logo">
      <a href="#home" class="text-decoration-none"><span>Jaydip</span>.dev</a>
    </div>

    <!-- Desktop Navigation -->
    <nav class="d-none d-lg-block">
      <ul class="d-flex mb-0 list-unstyled gap-4">
        <li><a href="#home" (click)="closeMenu()">Home</a></li>
        <li><a href="#about" (click)="closeMenu()">About</a></li>
        <li><a href="#skills" (click)="closeMenu()">Skills</a></li>
        <!-- <li><a href="#projects" (click)="closeMenu()">Projects</a></li> -->
        <li><a href="#experience" (click)="closeMenu()">Experience</a></li>
        <li><a href="#education" (click)="closeMenu()">Education</a></li>
        <li><a href="#contact" (click)="closeMenu()">Contact</a></li>
      </ul>
    </nav>

    <div class="nav-actions d-flex align-items-center gap-3">
      <!-- Theme Toggle -->
      <button class="theme-toggle" (click)="themeService.toggleTheme()" [title]="'Toggle ' + (themeService.themeSignal() === 'light' ? 'Dark' : 'Light') + ' Mode'">
        <i class="bi" [class.bi-sun-fill]="themeService.themeSignal() === 'light'" [class.bi-moon-fill]="themeService.themeSignal() === 'dark'"></i>
      </button>

      <!-- <a href="assets/resume.pdf" download class="btn-primary-custom d-none d-md-block">Resume</a> -->
      
      <!-- Mobile Toggle -->
      <button class="menu-toggle d-lg-none" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  <div class="mobile-menu d-lg-none" [class.active]="isMenuOpen">
    <ul class="list-unstyled text-center w-100 mt-5">
      <li class="my-4"><a href="#home" (click)="closeMenu()">Home</a></li>
      <li class="my-4"><a href="#about" (click)="closeMenu()">About</a></li>
      <li class="my-4"><a href="#skills" (click)="closeMenu()">Skills</a></li>
      <!-- <li class="my-4"><a href="#projects" (click)="closeMenu()">Projects</a></li> -->
      <li class="my-4"><a href="#experience" (click)="closeMenu()">Experience</a></li>
      <li class="my-4"><a href="#education" (click)="closeMenu()">Education</a></li>
      <li class="my-4"><a href="#contact" (click)="closeMenu()">Contact</a></li>
    </ul>
  </div>
</header>
