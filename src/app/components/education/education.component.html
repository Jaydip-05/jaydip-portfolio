<section class="education-section" id="education">
  <div class="container">

    <h2 class="section-title">Education background</h2>
    <div class="underline"></div>
    <p class="section-subtitle">Academic foundations that shaped my technical perspective.</p>

    <div class="row g-4 max-w-800 mx-auto">
      <div class="col-12" *ngFor="let edu of education">
        <div class="glass-card education-item d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
          <div class="left">
            <h3 class="h5 fw-bold mb-1">{{ edu.title }}</h3>
            <p class="text-primary fw-semibold mb-0 small">{{ edu.institute }}</p>
          </div>

          <div class="right">
            <span class="badge bg-primary rounded-pill px-3 py-2">{{ edu.year }}</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
